name: Supabase Migrations

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  migrate:
    name: Run Supabase production migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN_SECRET_NAME: SUPABASE_ACCESS_TOKEN
      SUPABASE_PROJECT_REF_SECRET_NAME: SUPABASE_PROJECT_REF
      SUPABASE_DB_PASSWORD_SECRET_NAME: SUPABASE_DB_PASSWORD
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whether production secrets are configured
        id: precheck
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets[env.SUPABASE_ACCESS_TOKEN_SECRET_NAME] }}
          SUPABASE_PROJECT_REF: ${{ secrets[env.SUPABASE_PROJECT_REF_SECRET_NAME] }}
          SUPABASE_DB_PASSWORD: ${{ secrets[env.SUPABASE_DB_PASSWORD_SECRET_NAME] }}
        run: |
          set -euo pipefail

          if [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ] && [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "run_migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_migrations=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain why migrations were skipped
        if: ${{ steps.precheck.outputs.run_migrations != 'true' }}
        run: |
          echo "Supabase production migrations were skipped because required GitHub Secrets are not configured."
          echo "This is expected for local-only/template usage."
          echo "To enable production migrations, set SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, and SUPABASE_DB_PASSWORD."

      - name: Setup Supabase CLI
        if: ${{ steps.precheck.outputs.run_migrations == 'true' }}
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        if: ${{ steps.precheck.outputs.run_migrations == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets[env.SUPABASE_ACCESS_TOKEN_SECRET_NAME] }}
          SUPABASE_PROJECT_REF: ${{ secrets[env.SUPABASE_PROJECT_REF_SECRET_NAME] }}
          SUPABASE_DB_PASSWORD: ${{ secrets[env.SUPABASE_DB_PASSWORD_SECRET_NAME] }}
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_ACCESS_TOKEN"
            missing=1
          fi

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_PROJECT_REF"
            missing=1
          fi

          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::Missing required GitHub secret: SUPABASE_DB_PASSWORD"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing. Go to Settings > Secrets and variables > Actions and add all required values."
            exit 1
          fi

          if ! [[ "$SUPABASE_PROJECT_REF" =~ ^[a-z0-9]{20}$ ]]; then
            echo "::warning::SUPABASE_PROJECT_REF does not look like a standard 20-character project ref. Double-check the value from Supabase Project Settings."
          fi

      - name: Link Supabase project
        if: ${{ steps.precheck.outputs.run_migrations == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets[env.SUPABASE_ACCESS_TOKEN_SECRET_NAME] }}
          SUPABASE_PROJECT_REF: ${{ secrets[env.SUPABASE_PROJECT_REF_SECRET_NAME] }}
          SUPABASE_DB_PASSWORD: ${{ secrets[env.SUPABASE_DB_PASSWORD_SECRET_NAME] }}
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Run database migrations
        if: ${{ steps.precheck.outputs.run_migrations == 'true' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets[env.SUPABASE_ACCESS_TOKEN_SECRET_NAME] }}
          SUPABASE_PROJECT_REF: ${{ secrets[env.SUPABASE_PROJECT_REF_SECRET_NAME] }}
          SUPABASE_DB_PASSWORD: ${{ secrets[env.SUPABASE_DB_PASSWORD_SECRET_NAME] }}
        run: |
          set -euo pipefail
          supabase db push --linked
